name: SonarQube analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  deployment_status:
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest
    # Run on push/PR always; on deployment_status only when Vercel succeeds
    if: |
      github.event_name != 'deployment_status' ||
      github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On deployment_status use the deployed commit; otherwise use default
          ref: ${{ github.event_name == 'deployment_status' && github.event.deployment.sha || github.sha }}
          fetch-depth: 0  # SonarQube needs full history for blame/new-code detection

      - name: Analyze with SonarQube
        uses: SonarSource/sonarqube-scan-action@7295e71c9583053f5bf40e9d4068a0c974603ec8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=madlalakhaya25_growfit
            -Dsonar.organization=madlalakhaya25
            -Dsonar.sources=web/src
            -Dsonar.exclusions=web/node_modules/**,web/.next/**,**/*.test.ts,**/*.spec.ts
